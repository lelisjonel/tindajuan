<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16A34A" />
    <title>TindaJuan Offline</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, sans-serif; background: #fffdf7; color: #14532d; }
      body { display: grid; min-height: 100vh; place-items: center; margin: 0; padding: 24px; text-align: center; }
      main { max-width: 420px; padding: 32px; border: 1px solid #e5e7eb; border-radius: 24px; background: white; box-shadow: 0 16px 40px rgba(20,83,45,.08); }
      .mark { display: grid; width: 72px; height: 72px; margin: 0 auto 20px; place-items: center; border-radius: 20px; background: #16a34a; color: #fff; font-size: 32px; font-weight: 900; }
      h1 { margin: 0; font-size: 28px; } p { color: #6b7280; line-height: 1.6; }
    </style>
  </head>
  <body><main><div class="mark">TJ</div><h1>Walang internet muna</h1><p>TindaJuan is offline. Your local records remain on this device. Reconnect, then refresh to continue using the full app.</p></main></body>
</html>
